  <main class="pagina">
    <section class="contacto">
      <h2>Sugiere un t&iacute;tulo</h2>
      <form class="formulario">
        <label for="nombre">Nombre</label>
        <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required>

        <label for="email">Correo electr&oacute;nico</label>
        <input type="email" id="email" name="email" placeholder="tu@email.com" required>

        <label for="mensaje">Pel&iacute;cula o serie</label>
        <textarea id="mensaje" name="mensaje" rows="4" placeholder="Escribe el titulo que quieres ver en CineSpot..." required></textarea>

        <button type="submit" class="btn btn-primary">Enviar sugerencia</button>
      </form>
    </section>
  </main>
