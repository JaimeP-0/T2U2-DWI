<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Registra tu apuesta en GolApuestas">
  <title>Apuestas | GolApuestas</title>
  <link rel="stylesheet" href="css/estilos.css">
  <link rel="stylesheet" href="css/diseno.css">
</head>
<body>
  <header class="header">
    <nav class="nav">
      <a href="index.html" class="logo">GolApuestas</a>
      <ul class="nav-links">
        <li><a href="index.html">Inicio</a></li>
        <li><a href="partidos.html">Partidos</a></li>
        <li><a href="equipo.html">Equipo</a></li>
        <li><a href="apuestas.html" class="activo">Apuestas</a></li>
      </ul>
    </nav>
  </header>

  <main class="pagina">
    <section class="contacto">
      <h2>Registrar apuesta</h2>
      <form class="formulario">
        <label for="nombre">Nombre</label>
        <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required>

        <label for="email">Correo electronico</label>
        <input type="email" id="email" name="email" placeholder="tu@email.com" required>

        <label for="partido">Partido</label>
        <select id="partido" name="partido" required>
          <option value="">Selecciona un partido</option>
          <option value="rm-bar">Real Madrid vs Barcelona</option>
          <option value="mc-liv">Manchester City vs Liverpool</option>
          <option value="ame-chi">America vs Chivas</option>
        </select>

        <label for="pronostico">Pronostico</label>
        <select id="pronostico" name="pronostico" required>
          <option value="">Selecciona resultado</option>
          <option value="local">Gana local</option>
          <option value="empate">Empate</option>
          <option value="visitante">Gana visitante</option>
        </select>

        <label for="monto">Monto (MXN)</label>
        <input type="number" id="monto" name="monto" min="10" max="5000" placeholder="100" required>

        <button type="submit" class="btn btn-primary">Confirmar apuesta</button>
      </form>
    </section>
  </main>

  <footer class="footer">
    <p>&copy; 2026 GolApuestas &mdash; Proyecto T2U2 DWI. Solo fines educativos.</p>
  </footer>
</body>
</html>
